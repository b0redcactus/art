  nav {
    width: 80px;
    min-height: 100vh;
    padding: 24px 16px;

    display: block;
    text-decoration: none;
    color: #000;
    font-size: 11px;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }
  nav a:hover { text-decoration: underline; }
  nav a.active { font-weight: 300; text-decoration: underline; }

  main {
    flex: 1;
    padding: 24px 0 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

    display: block;
    width: 700px;

    border: none;
